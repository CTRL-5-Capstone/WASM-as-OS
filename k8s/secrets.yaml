# k8s/secrets.yaml — Secret manifest TEMPLATE
# DO NOT commit real values.
# Populate via CI/CD:
#   kubectl create secret generic wasmos-secrets -n wasmos \
#     --from-literal=database-url="postgresql://..." \
#     --from-literal=jwt-secret="$(openssl rand -base64 48)" \
#     --from-literal=admin-key="$(openssl rand -hex 32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or use External Secrets Operator / Sealed Secrets for GitOps.
apiVersion: v1
kind: Secret
metadata:
  name: wasmos-secrets
  namespace: wasmos
type: Opaque
stringData:
  # !! Replace with real values before applying !!
  database-url: "postgresql://wasmos:CHANGE_ME@postgres-service:5432/wasmos"
  jwt-secret:   "CHANGE_ME_TO_AT_LEAST_32_RANDOM_CHARS"
  admin-key:    "CHANGE_ME_TO_HEX_STRING"
