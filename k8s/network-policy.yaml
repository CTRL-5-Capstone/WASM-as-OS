# k8s/network-policy.yaml — Zero-trust network isolation
# - Backend pods only accept ingress from the ingress controller + Prometheus
# - Postgres only accepts connections from backend pods
# - All egress allowed (DNS lookups, outbound HTTPS for external deps)
---
# ── Wasmos backend ────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wasmos-backend
  namespace: wasmos
spec:
  podSelector:
    matchLabels:
      app: wasmos
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow outbound HTTPS (e.g. external dependencies)
    - ports:
        - protocol: TCP
          port: 443
---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wasmos-postgres
  namespace: wasmos
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # Only wasmos backend pods may connect
    - from:
        - podSelector:
            matchLabels:
              app: wasmos
      ports:
        - protocol: TCP
          port: 5432
