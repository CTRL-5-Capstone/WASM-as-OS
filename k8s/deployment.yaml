apiVersion: apps/v1
kind: Deployment
metadata:
  name: wasmos
  labels:
    app: wasmos
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wasmos
  template:
    metadata:
      labels:
        app: wasmos
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Spread replicas across nodes so a single node failure doesn't take all pods down.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: wasmos
              topologyKey: kubernetes.io/hostname
      # Pod-level security: run as a non-root user, enforce fsGroup for volume access
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: wasmos
        # Always pull in production so rolling updates pick up the latest image.
        # IfNotPresent is only safe when image tags are immutable (e.g. SHA digests).
        image: wasmos:latest
        imagePullPolicy: Always
        # Container-level security: drop all Linux capabilities, no privilege escalation
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        # /metrics is served on the same port as HTTP (actix-web unified listener).
        # The "metrics" named port is an alias so the Prometheus annotation
        # prometheus.io/port: "8080" resolves via port name in ServiceMonitors.
        - name: metrics
          containerPort: 8080
          protocol: TCP
          # Note: both names map to 8080. Metrics are co-hosted on the HTTP port.
        env:
        # Enable strict secret validation at startup
        - name: WASMOS_ENV
          value: "production"
        - name: WASMOS__SERVER__HOST
          value: "0.0.0.0"
        - name: WASMOS__SERVER__PORT
          value: "8080"
        - name: WASMOS__DATABASE__URL
          valueFrom:
            secretKeyRef:
              name: wasmos-secrets
              key: database-url
        - name: WASMOS__SECURITY__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: wasmos-secrets
              key: jwt-secret
        - name: WASMOS__SECURITY__ADMIN_KEY
          valueFrom:
            secretKeyRef:
              name: wasmos-secrets
              key: admin-key
        # Enable JWT authentication in production
        - name: WASMOS__SECURITY__AUTH_ENABLED
          value: "true"
        - name: WASMOS__LOGGING__LEVEL
          valueFrom:
            configMapKeyRef:
              name: wasmos-config
              key: log-level
        - name: WASMOS__LOGGING__FORMAT
          value: "json"
        # Redis L2 cache — optional. Remove this env var if Redis is not deployed.
        # When unset, the app uses moka-only (L1 in-process cache per pod).
        # - name: REDIS_URL
        #   value: "redis://redis:6379"
        # Tell Rust where WASM files are stored (matches volumeMount below).
        # Without this, wasm_files_dir() falls back to CARGO_MANIFEST_DIR which
        # does not exist inside the container image.
        - name: WASM_FILES_DIR
          value: "/app/wasm_files"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: wasm-storage
          mountPath: /app/wasm_files
        # readOnlyRootFilesystem=true requires writable tmpfs for temp files
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: wasm-storage
        persistentVolumeClaim:
          claimName: wasmos-pvc
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wasmos
  labels:
    app: wasmos
spec:
  type: LoadBalancer
  selector:
    app: wasmos
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wasmos-pvc
spec:
  # ReadWriteMany is required when replicas > 1 so all pods can mount the same volume.
  # This requires a compatible StorageClass (e.g. AWS EFS, Azure Files, NFS, Rook-CephFS).
  # On clusters that only support ReadWriteOnce (e.g. local-path, gp2), set replicas: 1
  # in the Deployment and remove the minReplicas override in the HPA, then let the HPA
  # scale reads via separate read-only pods backed by object storage (S3/GCS).
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wasmos-config
data:
  log-level: "info"
  max-wasm-size-mb: "50"
  execution-timeout-secs: "30"
---
# Secrets are managed separately — do NOT commit real values here.
# Apply k8s/secrets.yaml (after filling in real values) before applying this file:
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/secrets.yaml   # populate from CI/CD or External Secrets Operator
#   kubectl apply -f k8s/deployment.yaml
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmos-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - wasmos.example.com
    secretName: wasmos-tls
  rules:
  - host: wasmos.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wasmos
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wasmos-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wasmos
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
