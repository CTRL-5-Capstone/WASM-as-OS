{{- if or .Values.secrets.databaseUrl .Values.secrets.jwtSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wasmos.fullname" . }}-secrets
  labels:
    {{- include "wasmos.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- if .Values.secrets.databaseUrl }}
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
{{- else }}
# Secret must be pre-created with:
#   kubectl create secret generic {{ include "wasmos.fullname" . }}-secrets \
#     --from-literal=database-url='postgresql://...' \
#     --from-literal=jwt-secret='<min-32-char-random-string>'
{{- end }}
