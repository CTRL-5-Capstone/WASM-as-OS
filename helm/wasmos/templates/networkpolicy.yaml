{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wasmos.fullname" . }}
  labels:
    {{- include "wasmos.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wasmos.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP traffic on port 8080
    - ports:
        - protocol: TCP
          port: 8080
    # Allow health-check probes from kubelet (any node IP)
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to PostgreSQL (default 5432)
    - ports:
        - protocol: TCP
          port: 5432
    # Allow HTTPS for any external calls
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
